  var lang = localStorage.getItem('site-lang') ||
    (navigator.language && navigator.language.startsWith('pl') ? 'pl' : 'en');

  function applyTranslations(l) {
    lang = l;
    localStorage.setItem('site-lang', l);
    document.documentElement.lang = l;
    var t = T[l];
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.innerHTML = t[key];
    });
    document.querySelectorAll('.lang-btn').forEach(function (btn) {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === l);
    });
  }

  function init() {
    var sw = document.createElement('div');
    sw.className = 'lang-switcher';
    sw.setAttribute('role', 'group');
    sw.setAttribute('aria-label', 'Language selector');
    sw.innerHTML =
      '<button class="lang-btn" data-lang="en" aria-label="English">EN</button>' +
      '<button class="lang-btn" data-lang="pl" aria-label="Polski">PL</button>';
    document.body.appendChild(sw);
    sw.querySelectorAll('.lang-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        applyTranslations(btn.getAttribute('data-lang'));
      });
    });
    applyTranslations(lang);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
