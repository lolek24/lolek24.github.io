title: Tomasz Dygas
description: >-
  SAP Developer, Solution Architect & DevOps Specialist based in Warsaw, Poland.
  Over 15 years of experience in SAP development, architecture, and DevOps.
author: Tomasz Dygas
baseurl: ""
url: "https://lolek24.github.io"

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /:title/

# just-the-docs theme settings (minimal style)
color_scheme: light
search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Front matter defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: "default"
      nav_exclude: true

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - .gitignore
  - "Dream Candidate Resume - Tomasz Dygas EN (1).pdf"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-sitemap

remote_theme: just-the-docs/just-the-docs
